<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emotion Classifier - Text Emotion Detection</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        .container {
            padding-top: 50px;
        }
        
        .card {
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            margin-bottom: 30px;
        }
        
        .card-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 15px 15px 0 0 !important;
            padding: 20px;
            font-size: 24px;
            font-weight: bold;
        }
        
        .form-control {
            border-radius: 10px;
            border: 2px solid #e0e0e0;
            transition: all 0.3s;
        }
        
        .form-control:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 0.2rem rgba(102, 126, 234, 0.25);
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 10px;
            padding: 12px 30px;
            font-size: 18px;
            transition: transform 0.2s;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        
        .result-card {
            background: white;
            border-radius: 15px;
            padding: 20px;
            margin-top: 20px;
            animation: slideIn 0.5s ease;
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .emotion-badge {
            display: inline-block;
            padding: 8px 20px;
            border-radius: 25px;
            font-size: 18px;
            font-weight: bold;
            margin: 10px 0;
        }
        
        .progress {
            height: 25px;
            border-radius: 12px;
            margin: 10px 0;
        }
        
        .progress-bar {
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            border-radius: 12px;
            transition: width 0.6s ease;
        }
        
        .emotion-list {
            max-height: 300px;
            overflow-y: auto;
        }
        
        .emotion-item {
            margin-bottom: 15px;
        }
        
        .loading {
            display: none;
            text-align: center;
            margin: 20px 0;
        }
        
        .spinner-border {
            width: 3rem;
            height: 3rem;
        }
        
        .footer {
            text-align: center;
            color: white;
            margin-top: 50px;
            padding: 20px;
        }
        
        .nav-link {
            color: white !important;
            font-weight: bold;
        }
        
        .nav-link:hover {
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container">
            <a class="navbar-brand" href="/">🎭 Emotion Classifier</a>
            <div class="navbar-nav">
                <a class="nav-link" href="/">Home</a>
                <a class="nav-link" href="/about">About</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card">
                    <div class="card-header text-center">
                        🎭 Text Emotion Classification
                    </div>
                    <div class="card-body">
                        <p class="text-muted text-center">Enter your text below and I'll detect the emotion behind it!</p>
                        
                        <form id="predictionForm">
                            <div class="mb-3">
                                <label for="textInput" class="form-label">Your Text:</label>
                                <textarea 
                                    class="form-control" 
                                    id="textInput" 
                                    rows="4" 
                                    placeholder="e.g., I'm so excited about the party tonight! 🎉"
                                    required
                                ></textarea>
                            </div>
                            
                            <div class="text-center">
                                <button type="submit" class="btn btn-primary">
                                    🚀 Detect Emotion
                                </button>
                            </div>
                        </form>
                        
                        <div class="loading" id="loading">
                            <div class="spinner-border text-primary" role="status">
                                <span class="visually-hidden">Loading...</span>
                            </div>
                            <p class="mt-2">Analyzing your text...</p>
                        </div>
                        
                        <div id="result" style="display: none;"></div>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="footer">
            <p>Powered by Deep Learning | Text Emotion Classification Model</p>
        </div>
    </div>

    <script>
        document.getElementById('predictionForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const text = document.getElementById('textInput').value;
            if (!text.trim()) {
                alert('Please enter some text!');
                return;
            }
            
            // Show loading spinner
            document.getElementById('loading').style.display = 'block';
            document.getElementById('result').style.display = 'none';
            
            try {
                const response = await fetch('/predict', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ text: text })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    displayResult(data);
                } else {
                    alert('Error: ' + data.error);
                }
            } catch (error) {
                alert('Error: ' + error.message);
            } finally {
                document.getElementById('loading').style.display = 'none';
            }
        });
        
        function displayResult(data) {
            const emotions = data.all_scores;
            const sortedEmotions = Object.entries(emotions).sort((a, b) => b[1] - a[1]);
            
            let emotionColors = {
                'joy': '#FFD700',
                'sadness': '#87CEEB',
                'anger': '#FF6B6B',
                'fear': '#9370DB',
                'love': '#FF69B4',
                'surprise': '#FFA500'
            };
            
            let html = `
                <div class="result-card">
                    <h4 class="text-center">Prediction Result</h4>
                    <div class="text-center">
                        <div class="emotion-badge" style="background: ${emotionColors[data.emotion] || '#667eea'}; color: white;">
                            ${data.emotion.toUpperCase()}
                        </div>
                        <p class="mt-2">Confidence: <strong>${(data.confidence * 100).toFixed(2)}%</strong></p>
                    </div>
                    
                    <hr>
                    
                    <h5>All Emotion Scores:</h5>
                    <div class="emotion-list">
            `;
            
            sortedEmotions.forEach(([emotion, score]) => {
                const percentage = (score * 100).toFixed(2);
                html += `
                    <div class="emotion-item">
                        <div class="d-flex justify-content-between">
                            <span><strong>${emotion}</strong></span>
                            <span>${percentage}%</span>
                        </div>
                        <div class="progress">
                            <div class="progress-bar" style="width: ${percentage}%; background: ${emotionColors[emotion] || '#667eea'}"></div>
                        </div>
                    </div>
                `;
            });
            
            html += `
                    </div>
                </div>
            `;
            
            document.getElementById('result').innerHTML = html;
            document.getElementById('result').style.display = 'block';
            
            // Scroll to result
            document.getElementById('result').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }
    </script>
</body>
</html>
